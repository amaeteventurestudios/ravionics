<style>
:root {
  --black:   #07090D;
  --steel:   #0F1219;
  --card:    #111520;
  --rule:    #1C2233;
  --muted:   #3D4A60;
  --body:    #8A9AB8;
  --white:   #EFF0F0;
  --accent:  #C8922A;
  --accent2: #9A6E1E;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}
.grid-lines {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,146,42,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,146,42,0.025) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none;
  z-index: 0;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  background: rgba(7,9,13,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--rule);
}
.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.1em;
  color: var(--white);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 120px 24px 80px;
  position: relative;
  z-index: 1;
}
.thanks-wrap {
  max-width: 560px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: fadeUp 0.7s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
.thanks-icon {
  width: 56px;
  height: 56px;
  border: 1px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
  position: relative;
}
.thanks-icon::before {
  content: '';
  position: absolute;
  inset: -6px;
  border: 1px solid rgba(200,146,42,0.15);
}
.thanks-icon svg {
  width: 24px;
  height: 24px;
  stroke: var(--accent);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.thanks-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.thanks-label::before, .thanks-label::after {
  content: '';
  display: block;
  width: 32px; height: 1px;
  background: var(--accent);
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 8vw, 80px);
  letter-spacing: 0.02em;
  line-height: 0.92;
  margin-bottom: 24px;
}
h1 span { color: var(--accent); }
p {
  font-size: 16px;
  color: var(--body);
  line-height: 1.8;
  max-width: 460px;
  margin-bottom: 40px;
}
.thanks-actions {
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.btn-primary {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  background: var(--accent);
  padding: 16px 36px;
  text-decoration: none;
  font-weight: 500;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  display: inline-block;
}
.btn-primary:hover {
  background: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(200,146,42,0.2);
}
.btn-ghost {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--body);
  border: 1px solid var(--rule);
  padding: 16px 36px;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s, transform 0.15s;
  display: inline-block;
}
.btn-ghost:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
}
.accent-bar {
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  position: relative;
  z-index: 1;
}
footer {
  position: relative;
  z-index: 1;
  border-top: 1px solid var(--rule);
  padding: 32px 24px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.footer-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.08em;
  color: var(--white);
}
.footer-logo span { color: var(--accent); }
.footer-links {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}
.footer-links a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
.footer-links a:hover { color: var(--accent); }
.footer-copy {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}
@media (max-width: 768px) {
  nav { padding: 16px 20px; justify-content: center; }
  .thanks-actions { flex-direction: column; width: 100%; }
  .btn-primary, .btn-ghost { width: 100%; text-align: center; }
}
</style>
</head>
<body>
<div class="grid-lines"></div>

<nav>
  <a href="/" class="nav-logo">RAVI<span>ONICS</span></a>
</nav>

<main>
  <div class="thanks-wrap">
    <div class="thanks-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="thanks-label">Message Received</div>
    <h1>WE'LL BE<br>IN <span>TOUCH.</span></h1>
    <p>Your message has been received. We review every inquiry personally and will be in touch shortly.</p>
    <div class="thanks-actions">
      <a href="/" class="btn-primary">Back to Ravionics</a>
      <a href="/#contact" class="btn-ghost">Send Another Message</a>
    </div>
  </div>
</main>

<div class="accent-bar"></div>
<footer>
  <div class="footer-logo">RAVI<span>ONICS</span></div>
  <div class="footer-links">
    <a href="/privacy.html">Privacy Policy</a>
    <span>·</span>
    <a href="/terms.html">Terms of Use</a>
  </div>
  <div class="footer-copy">© Ravionics. All rights reserved.</div>
</footer>
</body>
</html>
